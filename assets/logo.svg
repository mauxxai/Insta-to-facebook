<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle - Instagram gradient -->
  <defs>
    <radialGradient id="igGrad" cx="30%" cy="107%" r="150%">
      <stop offset="0%" stop-color="#fdf497"/>
      <stop offset="5%" stop-color="#fdf497"/>
      <stop offset="45%" stop-color="#fd5949"/>
      <stop offset="60%" stop-color="#d6249f"/>
      <stop offset="90%" stop-color="#285AEB"/>
    </radialGradient>
  </defs>
  
  <!-- Instagram camera body -->
  <rect x="25" y="45" width="150" height="120" rx="30" ry="30" fill="url(#igGrad)"/>
  
  <!-- Camera lens -->
  <circle cx="100" cy="107" r="35" fill="white" opacity="0.15"/>
  <circle cx="100" cy="107" r="28" fill="none" stroke="white" stroke-width="5"/>
  <circle cx="100" cy="107" r="18" fill="white" opacity="0.9"/>
  
  <!-- Camera top bump -->
  <rect x="65" y="33" width="70" height="28" rx="10" fill="url(#igGrad)"/>
  
  <!-- Flash dot -->
  <circle cx="155" cy="65" r="8" fill="white" opacity="0.9"/>
  
  <!-- FACEBOOK MASK overlaid on bottom half -->
  <!-- Blue mask shape -->
  <ellipse cx="100" cy="155" rx="75" ry="38" fill="#3b5998" opacity="0.95"/>
  <!-- Mask eye holes (show through) -->
  <ellipse cx="78" cy="148" rx="14" ry="11" fill="url(#igGrad)"/>
  <ellipse cx="122" cy="148" rx="14" ry="11" fill="url(#igGrad)"/>
  <!-- Mask string left -->
  <line x1="25" y1="148" x2="10" y2="142" stroke="#3b5998" stroke-width="4" stroke-linecap="round"/>
  <!-- Mask string right -->
  <line x1="175" y1="148" x2="190" y2="142" stroke="#3b5998" stroke-width="4" stroke-linecap="round"/>
  <!-- "f" letter on mask -->
  <text x="96" y="167" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">f</text>
  
  <!-- Small "mauxx AI" label -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">mauxx AI</text>
</svg>
